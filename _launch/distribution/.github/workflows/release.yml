name: Release to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write  # Required for PyPI Trusted Publishing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi  # Configure this environment in GitHub repo settings

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No API token needed - uses OIDC Trusted Publishing
        # Configure Trusted Publishing at https://pypi.org/manage/project/zer0lint/settings/publishing/
        # Publisher: GitHub Actions, repo: hermes-labs-ai/zer0lint, workflow: release.yml
